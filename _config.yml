title: Nic's Blog
url: "http://zweer.github.io/"
baseurl:
google_analytics_key: UA-40908812-1
google_maps_javascript_api_key: AIzaSyA7VWLSoih432dTdyU1CLq_VMnQ8UENPhs
disqus_shortname: zweer

# Default description in social shares for the jekyll-seo-tag gem
description: Yet another nerdy blog.

# Author details for the jekyll-seo-tag gem
author:
  name: Niccolò Olivieri Achille
  email: niccolo@olivieriachille.com
  twitter: DotZweer # twitter username without the @ symbol

# Social details for the jekyll-seo-tag gem
social:
  name: Nic's Blog
  links:
    - https://github.com/Zweer/zweer.github.io

collections:
  staff_members:
    output: false
  clients:
    output: true

paginate: 10
paginate_path: "/blog/:num/"
permalink: pretty

jekyll-archives:
  enabled:
    - "categories"

gems:
  - "jekyll-feed"
  - "jekyll-seo-tag"
  - "jekyll-paginate"
  - "jekyll-archives"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "clients"
    values:
      layout: "client"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "index.html"
      type: "pages"
    values:
      layout: "default"

# -----------
# CloudCannon

social_icons:
  - Facebook
  - Google Plus
  - Instagram
  - LinkedIn
  - Pinterest
  - Tumblr
  - Twitter
  - YouTube
  - RSS
